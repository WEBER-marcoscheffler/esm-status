  # Rate limit
  rateLimitExceededTitle: Anfragelimit erreicht
  rateLimitExceededIntro: Du hast das stündliche Anfragelimit erreicht. Bitte warte oder füge einen GitHub Personal Access Token hinzu.
  rateLimitExceededWhatDoesErrorMean: Was bedeutet dieser Fehler?
  rateLimitExceededErrorMeaning: Diese Seite nutzt die GitHub API für Echtzeit-Statusdaten. GitHub erlaubt standardmäßig 60 Anfragen pro Stunde pro IP-Adresse.
  rateLimitExceededErrorHowCanFix: Wie kann ich das beheben?
  rateLimitExceededErrorFix: Warte eine Stunde oder füge deinen GitHub Personal Access Token hinzu (5.000 Anfragen/Stunde).
  rateLimitExceededGeneratePAT: Personal Access Token erstellen
  rateLimitExceededHasSet: Personal Access Token ist gesetzt.
  rateLimitExceededRemoveToken: Token entfernen
  rateLimitExceededGitHubPAT: GitHub Personal Access Token
  rateLimitExceededCopyPastePAT: Token hier einfügen
  rateLimitExceededSaveToken: Token speichern

