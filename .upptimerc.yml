owner: WEBER-marcoscheffler
repo: esm-status

sites:
  - name: ESM Frontend
    url: https://esm.weber-online.com
  - name: ESM Backend API
    url: https://esm.weber-online.com/api/healthz
    expectedStatusCodes:
      - 200
  - name: ESM Dev Frontend
    url: https://esm-dev.weber-online.com
  - name: ESM Dev Backend API
    url: https://esm-dev.weber-online.com/api/healthz
    expectedStatusCodes:
      - 200

status-website:
  cname: esm-status.weber-online.com
  name: ESM-Suite Status
  logoUrl: https://raw.githubusercontent.com/WEBER-marcoscheffler/esm-status/main/assets/weber-logo.png
  favicon: https://raw.githubusercontent.com/WEBER-marcoscheffler/esm-status/main/assets/weber-favicon.ico
  introTitle: "**ESM-Suite** Statuspage"
  introMessage: Aktuelle Verfügbarkeit und Incidents der ESM-Suite Umgebungen.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/WEBER-marcoscheffler/esm-status
  themeUrl: /assets/theme.css
  css: ""
  customHeadHtml: '<meta name="theme-color" content="#000000"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">'

