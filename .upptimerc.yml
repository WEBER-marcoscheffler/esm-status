  duration24H: 24h
  duration7D: 7d
  duration30D: 30d
  duration1Y: 1y
  durationAll: alle

  # Incidents
  incidentReport: "Incident #$NUMBER →"
  activeIncidentSummary: Geöffnet am $DATE mit $POSTS Updates
