  errorTitle: Ein Fehler ist aufgetreten
  errorIntro: Beim Laden der Statusdaten ist ein Fehler aufgetreten.
  errorText: Bitte versuche es in wenigen Augenblicken erneut.
  errorHome: Zur Startseite
