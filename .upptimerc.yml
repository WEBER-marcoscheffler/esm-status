status-website:
  cname: esm-status.weber-online.com
  name: ESM-Suite Status
  logoUrl: https://raw.githubusercontent.com/WEBER-marcoscheffler/esm-status/main/assets/weber-logo.png
  favicon: https://raw.githubusercontent.com/WEBER-marcoscheffler/esm-status/main/assets/weber-favicon.ico
  introTitle: "**ESM-Suite** Statuspage"
  introMessage: Aktuelle Verfügbarkeit und Incidents der ESM-Suite Umgebungen.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/WEBER-marcoscheffler/esm-status
  themeUrl: /assets/theme.css
  css: ""
  customHeadHtml: '<meta name="theme-color" content="#000000"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><script>document.documentElement.setAttribute("data-theme",localStorage.getItem("esm-theme")||"dark")</script>'
  js: |
    (function(){
      var moon='<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/></svg>';
      var sun='<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/></svg>';
      function getTheme(){return localStorage.getItem("esm-theme")||"dark"}
      function disableBuiltinThemes(){document.querySelectorAll('link[href*="/themes/"]').forEach(function(l){l.disabled=true})}
      function setTheme(t){localStorage.setItem("esm-theme",t);document.documentElement.setAttribute("data-theme",t);disableBuiltinThemes();update();var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute("content",t==="dark"?"#000000":"#f5f5f7")}
      function update(){var b=document.getElementById("esm-theme-toggle");if(!b)return;var t=getTheme();b.innerHTML=(t==="dark"?sun:moon)+'<span>'+(t==="dark"?"Light":"Dark")+"</span>"}
      function init(){if(document.getElementById("esm-theme-toggle"))return;disableBuiltinThemes();var b=document.createElement("button");b.id="esm-theme-toggle";b.className="theme-toggle";b.setAttribute("aria-label","Toggle theme");b.addEventListener("click",function(){setTheme(getTheme()==="dark"?"light":"dark")});document.body.appendChild(b);setTheme(getTheme())}
      if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init)}else{init()}
      var obs=new MutationObserver(function(muts){muts.forEach(function(m){m.addedNodes.forEach(function(n){if(n.tagName==="LINK"&&n.href&&n.href.indexOf("/themes/")!==-1){n.disabled=true}})})});obs.observe(document.head,{childList:true});
    })();

