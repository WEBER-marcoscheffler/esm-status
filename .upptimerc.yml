status-website:
  cname: esm-status.weber-online.com
  name: ESM-Suite Status
  logoUrl: https://raw.githubusercontent.com/WEBER-marcoscheffler/esm-status/main/assets/weber-logo.png
  favicon: https://raw.githubusercontent.com/WEBER-marcoscheffler/esm-status/main/assets/weber-favicon.ico
  introTitle: "**ESM-Suite** Statuspage"
  introMessage: Aktuelle Verfügbarkeit und Incidents der ESM-Suite Umgebungen.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/WEBER-marcoscheffler/esm-status
  themeUrl: /assets/theme.css
  css: ""
  customHeadHtml: '<meta name="theme-color" content="#000000"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">'
  js: |
    (function(){
      var dark={
        "--body-background-color":"#000000","--body-text-color":"#f5f5f7",
        "--card-background-color":"rgba(28,28,30,0.72)","--card-border-color":"rgba(255,255,255,0.08)",
        "--nav-background-color":"rgba(22,22,24,0.82)","--nav-border-bottom-color":"rgba(255,255,255,0.06)",
        "--nav-current-border-bottom-color":"#818cf8",
        "--up-border-left-color":"#30d158","--up-color-color":"#f5f5f7",
        "--down-border-left-color":"#ff453a","--down-color-color":"#f5f5f7",
        "--down-background-color":"rgba(255,69,58,0.1)",
        "--degraded-border-left-color":"#ff9f0a","--degraded-color-color":"#f5f5f7",
        "--tag-color":"#ffffff","--tag-up-background-color":"#30d158",
        "--tag-down-background-color":"#ff453a","--tag-degraded-background-color":"#ff9f0a",
        "--change-background-color":"rgba(255,159,10,0.12)",
        "--code-color":"#e5e5ea","--code-background-color":"rgba(255,255,255,0.06)",
        "--graph-opacity":"0.85","--graph-filter":"saturate(0.8)",
        "--error-button-border-color":"#6366f1","--error-button-background-color":"#4f46e5","--error-button-color":"#fff",
        "--submit-button-border-color":"#6366f1","--submit-button-background-color":"#4f46e5","--submit-button-color":"#fff",
        "--glass-bg":"rgba(255,255,255,0.04)","--glass-bg-hover":"rgba(255,255,255,0.07)",
        "--glass-border":"rgba(255,255,255,0.10)","--glass-border-hover":"rgba(255,255,255,0.18)",
        "--glass-shadow":"0 2px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06)",
        "--glass-shadow-hover":"0 4px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.09)",
        "--nav-glass-bg":"rgba(30,30,32,0.55)",
        "--nav-glass-shadow":"0 1px 0 rgba(255,255,255,0.04), 0 4px 24px rgba(0,0,0,0.3)",
        "--status-glass-bg":"rgba(48,209,88,0.06)","--status-glass-border":"rgba(48,209,88,0.12)",
        "--status-glass-shadow":"0 2px 16px rgba(48,209,88,0.08), inset 0 1px 0 rgba(48,209,88,0.06)",
        "--logo-filter":"brightness(0) invert(1)",
        "--toggle-bg":"rgba(255,255,255,0.06)","--toggle-bg-hover":"rgba(255,255,255,0.12)"
      };
      var light={
        "--body-background-color":"#f2f2f7","--body-text-color":"#1d1d1f",
        "--card-background-color":"rgba(255,255,255,0.72)","--card-border-color":"rgba(0,0,0,0.06)",
        "--nav-background-color":"rgba(255,255,255,0.82)","--nav-border-bottom-color":"rgba(0,0,0,0.06)",
        "--nav-current-border-bottom-color":"#4f46e5",
        "--up-border-left-color":"#28a745","--up-color-color":"#1d1d1f",
        "--down-border-left-color":"#d63031","--down-color-color":"#1d1d1f",
        "--down-background-color":"rgba(214,48,49,0.06)",
        "--degraded-border-left-color":"#e67e22","--degraded-color-color":"#1d1d1f",
        "--tag-color":"#ffffff","--tag-up-background-color":"#28a745",
        "--tag-down-background-color":"#d63031","--tag-degraded-background-color":"#e67e22",
        "--change-background-color":"rgba(230,126,34,0.1)",
        "--code-color":"#1d1d1f","--code-background-color":"rgba(0,0,0,0.04)",
        "--graph-opacity":"1","--graph-filter":"none",
        "--error-button-border-color":"#4338ca","--error-button-background-color":"#4f46e5","--error-button-color":"#fff",
        "--submit-button-border-color":"#4338ca","--submit-button-background-color":"#4f46e5","--submit-button-color":"#fff",
        "--glass-bg":"rgba(255,255,255,0.45)","--glass-bg-hover":"rgba(255,255,255,0.65)",
        "--glass-border":"rgba(255,255,255,0.60)","--glass-border-hover":"rgba(255,255,255,0.80)",
        "--glass-shadow":"0 2px 20px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.8)",
        "--glass-shadow-hover":"0 4px 32px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.9)",
        "--nav-glass-bg":"rgba(255,255,255,0.50)",
        "--nav-glass-shadow":"0 1px 0 rgba(255,255,255,0.7), 0 4px 24px rgba(0,0,0,0.05)",
        "--status-glass-bg":"rgba(40,167,69,0.05)","--status-glass-border":"rgba(40,167,69,0.12)",
        "--status-glass-shadow":"0 2px 16px rgba(40,167,69,0.06), inset 0 1px 0 rgba(255,255,255,0.6)",
        "--logo-filter":"none",
        "--toggle-bg":"rgba(255,255,255,0.45)","--toggle-bg-hover":"rgba(255,255,255,0.65)"
      };
      var moon='<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/></svg>';
      var sun='<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/></svg>';
      function getTheme(){return localStorage.getItem("esm-theme")||"dark"}
      function applyVars(t){
        var vars=t==="dark"?dark:light;
        var el=document.documentElement;
        Object.keys(vars).forEach(function(k){el.style.setProperty(k,vars[k])});
        el.setAttribute("data-theme",t);
      }
      function setTheme(t){
        localStorage.setItem("esm-theme",t);
        applyVars(t);
        updateBtn();
        var m=document.querySelector('meta[name="theme-color"]');
        if(m)m.setAttribute("content",t==="dark"?"#000000":"#f5f5f7");
      }
      function updateBtn(){
        var b=document.getElementById("esm-theme-toggle");if(!b)return;
        var t=getTheme();
        b.innerHTML=(t==="dark"?sun:moon)+'<span>'+(t==="dark"?"Light":"Dark")+"</span>";
      }
      function init(){
        applyVars(getTheme());
        if(document.getElementById("esm-theme-toggle"))return;
        var b=document.createElement("button");b.id="esm-theme-toggle";b.className="theme-toggle";
        b.setAttribute("aria-label","Toggle theme");
        b.addEventListener("click",function(){setTheme(getTheme()==="dark"?"light":"dark")});
        document.body.appendChild(b);updateBtn();
      }
      applyVars(getTheme());
      if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init)}else{init()}
      setInterval(function(){applyVars(getTheme())},500);
      setTimeout(function(){clearInterval(this)},5000);
    })();

